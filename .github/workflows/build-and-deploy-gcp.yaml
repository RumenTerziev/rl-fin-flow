name: Build and Push Docker Images to GCR

on:
  workflow_run:
    workflows: [ "Auto Tag and Release (MAJOR.MINOR)" ]
    types:
      - completed

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: europe-west1
  REGISTRY: gcr.io
  IMAGE: dlrfinflow-api

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version: ${{ steps.extract_version.outputs.version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.7

      - name: Build Gradle project
        run: gradle build -x test

      - name: Extract tag version
        id: extract_version
        run: |
          VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "${GITHUB_SHA::7}")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Latest tag is $VERSION"

      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Build and Push Docker Images
        run: |
          IMAGE_BASE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}
          echo "Building Docker image: ${IMAGE_BASE}:${VERSION}"
          docker build \
            -t ${IMAGE_BASE}:${VERSION} \
            -t ${IMAGE_BASE}:latest \
            .
          docker push ${IMAGE_BASE}:${VERSION}
          docker push ${IMAGE_BASE}:latest

  deploy-to-gcp:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to GCP via Workload Identity
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        env:
          VERSION: ${{ needs.build-and-push.outputs.version }}
          SECRETS_MAPPING: >-
            DB_DATABASE=DB_DATABASE:latest,CLOUD_SQL_INSTANCE=CLOUD_SQL_INSTANCE:latest,DB_USERNAME=DB_USERNAME:latest,DB_PASSWORD=DB_PASSWORD:latest,OPEN_AI_API_KEY=OPEN_AI_API_KEY:latest,ALLOWED_ORIGINS=ALLOWED_ORIGINS:latest,GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest,GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest,GOOGLE_TOKEN_URI=GOOGLE_TOKEN_URI:latest,BNB_CURRENCY_RATE_URL=BNB_CURRENCY_RATE_URL:latest,OPEN_EXCHANGE_CURRENCY_CONVERTOR_URL=OPEN_EXCHANGE_CURRENCY_CONVERTOR_URL:latest,OPEN_AI_CHAT_MODEL=OPEN_AI_CHAT_MODEL:latest,ADMIN_NAME=ADMIN_NAME:latest,ADMIN_EMAIL=ADMIN_EMAIL:latest,ADMIN_PICTURE_URL=ADMIN_PICTURE_URL:latest
        run: |
          gcloud run deploy ${{ env.IMAGE }} \
            --image=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.IMAGE }}:${VERSION} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --service-account=${{ secrets.GCP_SERVICE_ACCOUNT }} \
            --add-cloudsql-instances=${{ secrets.CLOUD_SQL_INSTANCE }} \
            --network=${{ secrets.GCP_VPC }} \
            --subnet=${{ secrets.GCP_SUB }} \
            --vpc-egress=all-traffic \
            --ingress=internal \
            --no-allow-unauthenticated \
            --port=8080 \
            --memory=2Gi \
            --cpu=1 \
            --timeout=300 \
            --set-env-vars="SPRING_PROFILES_ACTIVE=prod,DDL_STRATEGY=none" \
            --set-secrets="${SECRETS_MAPPING}" \
            --project=${{ env.PROJECT_ID }}
